name: Generate champion tooltips

# CommunityDragon の本番パッチデータから全チャンピオンの詳細ツールチップ JSON を
# 生成し、frontend/public/tooltips/ にコミットする。
# - スクリプト変更時に自動実行
# - 週1回のスケジュール実行で新パッチを無人追従
#   ※ schedule はリポジトリの「デフォルトブランチ」のワークフローのみ発火する。
#     公開ブランチをデフォルトに設定（または main へマージ）すると有効になる。
on:
  workflow_dispatch:
  schedule:
    # 毎週木曜 03:00 UTC（日本時間 12:00）。LoLパッチは水曜(米国)配信のため翌日に追従
    - cron: '0 3 * * 4'
  push:
    paths:
      - scripts/generate_tooltips.py
      - scripts/generate_stat_overrides.py
      - scripts/generate_item_fixes.py
      - scripts/generate_sitemap.py
      - .github/workflows/generate-tooltips.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test (special champions included)
        run: python3 scripts/generate_tooltips.py --only Urgot,Ahri,Annie,Aphelios,Elise,Nidalee,Gnar,Jayce,Yunara,Akshan,Gangplank,Karma --out /tmp/smoke

      - name: Show smoke output for special champions
        run: |
          python3 - << 'EOF'
          import json, re
          for a in ("Aphelios", "Elise", "Jayce", "Yunara", "Akshan", "Gangplank", "Karma"):
              d = json.load(open(f"/tmp/smoke/{a}.json"))
              print(f"##### {a} unresolved={d['unresolvedCount']}")
              for k in ("q", "w", "e", "r"):
                  s = d["skills"][k]
                  plain = re.sub(r"<[^>]+>", "", s["description"])
                  print(f"[{k.upper()}] {s['name']} len={len(plain)} src={s.get('source')}")
                  print(plain[:300])
                  if s.get("unresolved"):
                      print("  !!", s["unresolved"])
              print()
          EOF

      - name: Generate all champions
        run: python3 scripts/generate_tooltips.py --out frontend/public/tooltips

      - name: Generate stat overrides (DDragonのAD成長値欠落の補完)
        run: python3 scripts/generate_stat_overrides.py --out frontend/public/tooltips

      - name: Generate item description fixes (アイテム説明の0/空欄数値の修復)
        run: python3 scripts/generate_item_fixes.py

      - name: Generate sitemap
        run: python3 scripts/generate_sitemap.py --tooltips frontend/public/tooltips --out frontend/public/sitemap.xml

      - name: Commit generated tooltips
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/tooltips frontend/public/sitemap.xml
          if git diff --cached --quiet; then
            echo "変更なし（既に最新）"
          else
            git commit -m "chore: regenerate champion tooltips from CommunityDragon"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
