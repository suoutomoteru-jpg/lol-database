name: Generate champion tooltips

# CommunityDragon の本番パッチデータから全チャンピオンの詳細ツールチップ JSON を
# 生成し、frontend/public/tooltips/ にコミットする。
# スクリプト変更時に自動実行（workflow_dispatch は手動実行用）。
on:
  workflow_dispatch:
  push:
    paths:
      - scripts/generate_tooltips.py
      - .github/workflows/generate-tooltips.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test (special champions included)
        run: python3 scripts/generate_tooltips.py --only Urgot,Ahri,Annie,Aphelios,Elise,Nidalee,Gnar,Jayce,Yunara,Akshan,Gangplank,Karma --out /tmp/smoke

      - name: Show smoke output for special champions
        run: |
          python3 - << 'EOF'
          import json, re
          for a in ("Aphelios", "Elise", "Jayce", "Yunara", "Akshan", "Gangplank", "Karma"):
              d = json.load(open(f"/tmp/smoke/{a}.json"))
              print(f"##### {a} unresolved={d['unresolvedCount']}")
              for k in ("q", "w", "e", "r"):
                  s = d["skills"][k]
                  plain = re.sub(r"<[^>]+>", "", s["description"])
                  print(f"[{k.upper()}] {s['name']} len={len(plain)} src={s.get('source')}")
                  print(plain[:300])
                  if s.get("unresolved"):
                      print("  !!", s["unresolved"])
              print()
          EOF

      - name: Generate all champions
        run: python3 scripts/generate_tooltips.py --out frontend/public/tooltips

      - name: Commit generated tooltips
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/tooltips
          if git diff --cached --quiet; then
            echo "変更なし（既に最新）"
          else
            git commit -m "chore: regenerate champion tooltips from CommunityDragon"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
