name: Probe item modes

on:
  push:
    paths:
      - 'scripts/probe_item_modes.py'
      - '.github/workflows/probe-item-modes.yml'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run probe
        run: python scripts/probe_item_modes.py
